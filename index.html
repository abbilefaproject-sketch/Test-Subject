    </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".card, .hero").forEach(el => {
        el.style.opacity = 0;
        el.style.transform = "translateY(40px)";
        
        setTimeout(() => {
            el.style.transition = "0.8s ease";
            el.style.opacity = 1;
            el.style.transform = "translateY(0)";
        }, 200);
    });
});
</script>
